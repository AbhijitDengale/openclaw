services:
  - type: web
    name: openclaw
    runtime: image
    image:
      url: ghcr.io/openclaw/openclaw:latest
    plan: standard
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "18789"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=1536"
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
    dockerCommand: /bin/sh -c mkdir -p /data/.openclaw /home/node/.openclaw /data/workspace && ln -sfn /data/.openclaw /home/node/.openclaw && node openclaw.mjs onboard --non-interactive --mode local --auth-choice google-api-key --gemini-api-key "$GEMINI_API_KEY" --gateway-auth token --gateway-token "$OPENCLAW_GATEWAY_TOKEN" --skip-health --accept-risk && node openclaw.mjs config set gateway.bind lan && node openclaw.mjs config set gateway.controlUi.dangerouslyAllowHostHeaderOriginFallback true && node openclaw.mjs config set gateway.controlUi.allowInsecureAuth true && node openclaw.mjs config set gateway.controlUi.dangerouslyDisableDeviceAuth true && exec node openclaw.mjs gateway --port 18789
    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 10
