services:
  - type: web
    name: openclaw
    runtime: image
    image:
      url: ghcr.io/openclaw/openclaw:main-slim
    plan: standard
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=1536"
      - key: SETUP_PASSWORD
        sync: false
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
    dockerCommand: /bin/sh -c mkdir -p /data/.openclaw /home/node/.openclaw && echo '{"gateway":{"controlUi":{"dangerouslyAllowHostHeaderOriginFallback":true},"dangerouslyDisableDeviceAuth":true,"allowInsecureAuth":true}}' > /home/node/.openclaw/openclaw.json && node openclaw.mjs gateway --bind lan --port 10000 --allow-unconfigured
    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 10
