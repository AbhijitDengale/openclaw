services:
  - type: web
    name: openclaw
    runtime: image
    image:
      url: ghcr.io/openclaw/openclaw:latest
    plan: standard
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "18789"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=1536"
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
    dockerCommand: /bin/sh -c mkdir -p /data/.openclaw /data/workspace && ln -sfn /data/.openclaw /home/node/.openclaw && exec node openclaw.mjs gateway --bind lan --port 18789 --allow-unconfigured
    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 10
